name: Renovate
on:
  workflow_dispatch:
defaults:
  run:
    shell: nix run --file . devShells.ci-essentials -- bash {0}
jobs:
  renovate:
    strategy:
      matrix:
        app-installation-owner:
          - bigolu
        include:
          - app-installation-owner: bigolu
            repos: bigolu/system-configurations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-installation-token
        with:
          client-id: ${{ vars.BIGOLU_RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.BIGOLU_RENOVATE_PRIVATE_KEY }}
          owner: ${{ matrix.app-installation-owner }}
      - name: Run renovate
        env:
          RENOVATE_TOKEN: "${{ steps.app-installation-token.outputs.token }}"
          RENOVATE_REPOSITORIES: ${{ matrix.repos }}
        run: mise run ci:renovate
      - if: always()
        uses: ./.github/actions/save-cache
